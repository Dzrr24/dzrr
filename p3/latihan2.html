<HTML>

<HEAD>
    <TITLE> Radio, checkbox dan select</TITLE>
</HEAD>

<BODY>
    <FORM ACTION="latihan3.html" METHOD="GET">
        PILIH WARNA KESUKAAN ANDA?<br>
        <INPUT TYPE="RADIO" NAME="jur" VALUE="B">BIRU<br>
        <INPUT TYPE="RADIO" NAME="jur" VALUE="R">MERAH<br>
        <INPUT TYPE="RADIO" NAME="jur" VALUE="G">HIJAU<br>
        <br>
        MAKANAN FAVORIT ANDA (boleh lebih dari satu)<br>
        <INPUT TYPE="CHECKBOX" NAME="mk" VALUE="MIE">MIE <br>
        <INPUT TYPE="CHECKBOX" NAME="mk" VALUE="AYAM">AYAM<br>
        <INPUT TYPE="CHECKBOX" NAME="mk" VALUE="MANUSIA">MANUSIA<br>
        Asal daerah anda?<br>
        <SELECT NAME="daerah" SIZE="1">
            <OPTION>BANGKINANG<br>
            <OPTION>Dumai<br>
            <OPTION>Duri<br>
            <OPTION>Jakarta<br>
            <OPTION>Padang<br>
            <OPTION>Medan<br>
            <OPTION>Tidak ada di pilihan<br>
        </SELECT>
        <INPUT TYPE="SUBMIT" NAME="kirim" VALUE="kirim">
    </FORM>
</BODY>

</HTML>
