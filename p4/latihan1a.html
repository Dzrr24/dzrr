<HTML>

<HEAD>
    <TITLE> Radio, checkbox dan select</TITLE>
<style>
    fieldset{
        width: fit-content;
    }
</style>
</HEAD>

<BODY>
    <fieldset>
    <FORM ACTION="latihan1.html" METHOD="GET">
        Tanggal Lahir : <input type="date" name="tglLahir"> <br>

        <br>
        Jurusan Anda?<br>
        <INPUT TYPE="RADIO" NAME="jur" VALUE="TI">TEKNIK INFORMATIKA<br>
        
        <br>
        Mata Kuliah yang anda senangi <br>
        <INPUT TYPE="CHECKBOX" NAME="mk" VALUE="bengkel">Bengkel Web <br>

        <br>
        berapa jumlah gmail anda gunakan : <input type="number" name="nomor" min="1" max="5"> <br>
        
        <br>
        Asal daerah anda?<br>
        <SELECT NAME="daerah" SIZE="1">
            <OPTION>Pekanbaru<br>
            <OPTION>Dumai<br>
            <OPTION>Duri<br>
            <OPTION>Jakarta<br>
            <OPTION>Padang<br>
            <OPTION>Medan<br>
            <OPTION>Tidak ada di pilihan<br>
                
        </SELECT>
        <br>
        <INPUT TYPE="SUBMIT" NAME="NEXT" VALUE="NEXT">
        
        

    </FORM>
    </fieldset>
</BODY>

</HTML>
