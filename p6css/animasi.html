<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi</title>
    <style>
        #box {
            width: 100px;
            height: 100px;
            background-color: aqua;
            position: relative;
        }
    </style>
</head>
<body>
    <button id="btn">gerakkan</button>
    <div id="box"></div>

    <script>
        document.getElementById("btn").addEventListener("click",
            function(){
                document.getElementById("box").style.left = "200px";
            }
        )
    </script>
</body>
</html>
